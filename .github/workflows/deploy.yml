name: Deploy to Simply.com
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # STEP 1: Install Node.js and build frontend assets
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Check for frontend changes
        id: check-frontend
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(resources/|package\.json|package-lock\.json|vite\.config)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install npm dependencies
        if: steps.check-frontend.outputs.changed == 'true' && steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build assets
        if: steps.check-frontend.outputs.changed == 'true'
        run: npm run build

      # STEP 1b: Install Composer dependencies locally (cached)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      # STEP 2: Setup the SSH Key so the runner can talk to Simply.com
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "placeholder" # We will ignore this in the next step
          if_key_exists: fail

      # STEP 2: Sync files using Native Rsync
      - name: Deploy with Native Rsync
        run: |
          rsync -avzr -e "ssh -o StrictHostKeyChecking=no" \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='node_modules/' \
          --exclude='.env' \
          --exclude='storage/' \
          ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/marocloi.com

      # STEP 3: Run Remote Commands
      - name: Run Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/marocloi.com/
            /opt/alt/php83/usr/bin/php artisan package:discover --ansi
            /opt/alt/php83/usr/bin/php artisan migrate --force
            /opt/alt/php83/usr/bin/php artisan config:cache
            /opt/alt/php83/usr/bin/php artisan route:cache

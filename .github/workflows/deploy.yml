name: Deploy to Simply.com
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # STEP 1: Install Node.js and build frontend assets
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and build assets
        run: |
          npm ci
          npm run build

      # STEP 2: Setup the SSH Key so the runner can talk to Simply.com
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "placeholder" # We will ignore this in the next step
          if_key_exists: fail

      # STEP 2: Sync files using Native Rsync
      - name: Deploy with Native Rsync
        run: |
          rsync -avzr -e "ssh -o StrictHostKeyChecking=no" \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='node_modules/' \
          --exclude='vendor/' \
          --exclude='.env' \
          --exclude='storage/' \
          ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/marocloi.com

      # STEP 3: Run Remote Commands
      - name: Run Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/marocloi.com/ 
            /opt/alt/php83/usr/bin/php /usr/local/bin/composer install --no-interaction --prefer-dist --optimize-autoloader
            /opt/alt/php83/usr/bin/php artisan migrate --force
            /opt/alt/php83/usr/bin/php artisan config:cache
            /opt/alt/php83/usr/bin/php artisan route:cache
